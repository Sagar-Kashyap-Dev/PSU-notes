<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Progress Tracker</title>
<style>
  :root {
    --bg: #f8f9fa; --surface: #ffffff; --surface2: #f1f3f5;
    --border: #dee2e6; --text: #212529; --muted: #6c757d;
    --green: #2f9e44; --green-bg: #ebfbee; --green-text: #1e7e34;
    --yellow: #e67700; --yellow-bg: #fff9db; --blue: #1971c2;
    --blue-bg: #e7f5ff; --red: #c92a2a; --red-bg: #fff5f5;
    --radius: 8px; --radius-lg: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }
  
  #app { display: flex; height: 100vh; overflow: hidden; }
  
  /* Sidebar */
  #sidebar { width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  #sidebar-header h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  #sidebar-header p { font-size: 12px; color: var(--muted); }
  #search-wrap { padding: 10px 16px; border-bottom: 1px solid var(--border); }
  #search { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; background: var(--bg); color: var(--text); outline: none; }
  #search:focus { border-color: var(--blue); }
  #subject-nav { overflow-y: auto; flex: 1; padding: 8px 0; }
  
  .nav-subject { display: flex; align-items: center; gap: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.15s; border-radius: 0; }
  .nav-subject:hover { background: var(--bg); }
  .nav-subject.active { background: var(--blue-bg); color: var(--blue); }
  .nav-subject .nav-badge { margin-left: auto; font-size: 11px; padding: 2px 6px; border-radius: 10px; background: var(--surface2); color: var(--muted); }
  .nav-subject.active .nav-badge { background: var(--blue-bg); color: var(--blue); }
  
  /* Main */
  #main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  
  /* Dashboard */
  #dashboard { padding: 20px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
  #dashboard h2 { font-size: 14px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
  #overall-bar-wrap { margin: 10px 0 6px; background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
  #overall-bar { height: 100%; background: var(--blue); border-radius: 4px; transition: width 0.3s; width: 0%; }
  #overall-stats { font-size: 13px; color: var(--muted); }
  .stat-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 14px; }
  .stat-card { background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; text-align: center; }
  .stat-card .val { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
  
  /* Subjects Grid */
  #subjects-grid { padding: 20px 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
  .subject-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .subject-card:hover { border-color: #adb5bd; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .subject-card.active { border-color: var(--blue); }
  .subject-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .subject-card-name { font-weight: 600; font-size: 14px; }
  .subject-card-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .status-complete { background: var(--green-bg); color: var(--green-text); }
  .status-partial { background: var(--yellow-bg); color: var(--yellow); }
  .status-none { background: var(--surface2); color: var(--muted); }
  .subject-card-count { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .card-bar-wrap { background: var(--surface2); border-radius: 3px; height: 4px; margin-top: 6px; overflow: hidden; }
  .card-bar { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .card-pct { font-size: 12px; color: var(--muted); text-align: right; margin-top: 4px; }
  
  /* Content Panel */
  #content { padding: 0 24px 24px; }
  #content-header { padding: 16px 0 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 10; }
  #content-title { font-size: 18px; font-weight: 600; }
  .btn-group { display: flex; gap: 8px; }
  .btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 13px; cursor: pointer; background: var(--surface); color: var(--text); transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn-danger { border-color: #ffc9c9; color: var(--red); }
  .btn-danger:hover { background: var(--red-bg); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  
  /* Tree */
  .tree-subject { margin-bottom: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .tree-subject-header { padding: 12px 16px; display: flex; align-items: center; gap: 8px; cursor: pointer; border-bottom: 1px solid var(--border); user-select: none; }
  .tree-subject-header:hover { background: var(--bg); }
  .chevron { transition: transform 0.2s; font-size: 12px; color: var(--muted); }
  .chevron.open { transform: rotate(90deg); }
  .tree-subject-name { font-weight: 600; font-size: 14px; flex: 1; }
  .tree-subject-meta { font-size: 12px; color: var(--muted); }
  .tree-body { padding: 8px 0; }
  .tree-body.hidden { display: none; }
  
  .tree-node { display: flex; align-items: center; gap: 6px; padding: 4px 16px 4px; cursor: default; font-size: 13px; }
  .tree-node.leaf { cursor: pointer; }
  .tree-node.leaf:hover { background: var(--bg); }
  .tree-node.indent-1 { padding-left: 32px; }
  .tree-node.indent-2 { padding-left: 48px; }
  .tree-node.indent-3 { padding-left: 64px; }
  .tree-node.branch { color: var(--muted); font-weight: 500; margin-top: 4px; }
  
  .leaf-icon { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .leaf-label { flex: 1; }
  .tree-node.done .leaf-label { text-decoration: line-through; color: var(--green); }
  .leaf-cb { width: 15px; height: 15px; cursor: pointer; accent-color: var(--green); flex-shrink: 0; }
  
  .branch-icon { font-size: 11px; flex-shrink: 0; color: #adb5bd; }
  .branch-toggle { cursor: pointer; }
  .branch-toggle:hover { color: var(--text); }
  
  /* Search highlights */
  .highlight { background: #fff3bf; border-radius: 2px; }
  .hidden-node { display: none !important; }
  
  /* Modal */
  #modal-backdrop { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
  #modal-backdrop.show { display: flex; }
  #modal { background: var(--surface); border-radius: var(--radius-lg); padding: 24px; min-width: 320px; max-width: 400px; }
  #modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  #modal p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }
  #modal .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .btn-confirm { background: var(--red); color: #fff; border-color: var(--red); }
  .btn-confirm:hover { background: #a61e1e; }
  
  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  
  /* View toggle */
  #view-btns { display: flex; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  #view-btns button { border: none; padding: 6px 12px; font-size: 13px; cursor: pointer; background: var(--surface); color: var(--muted); transition: background 0.15s; }
  #view-btns button.active { background: var(--blue-bg); color: var(--blue); font-weight: 500; }

  @media (max-width: 700px) {
    #sidebar { display: none; }
    .stat-cards { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>📚 Study Tracker</h1>
      <p id="sidebar-overall">Loading...</p>
    </div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search topics..." autocomplete="off">
    </div>
    <div id="subject-nav"></div>
  </div>
  
  <div id="main">
    <div id="dashboard">
      <h2>Overall Progress</h2>
      <div id="overall-bar-wrap"><div id="overall-bar"></div></div>
      <div id="overall-stats"></div>
      <div class="stat-cards">
        <div class="stat-card"><div class="val" id="sc-total">0</div><div class="lbl">Total Topics</div></div>
        <div class="stat-card"><div class="val" id="sc-done">0</div><div class="lbl">Completed</div></div>
        <div class="stat-card"><div class="val" id="sc-rem">0</div><div class="lbl">Remaining</div></div>
        <div class="stat-card"><div class="val" id="sc-pct">0%</div><div class="lbl">Percentage</div></div>
      </div>
    </div>

    <div id="content">
      <div id="content-header">
        <div id="content-title">All Subjects</div>
        <div style="display:flex;gap:10px;align-items:center;">
          <div id="view-btns">
            <button class="active" id="btn-cards" onclick="setView('cards')">Cards</button>
            <button id="btn-tree" onclick="setView('tree')">Tree</button>
          </div>
          <div class="btn-group">
            <button class="btn btn-sm btn-danger" onclick="confirmReset('all')">Reset All</button>
          </div>
        </div>
      </div>
      <div id="view-cards"><div id="subjects-grid"></div></div>
      <div id="view-tree" style="display:none;"></div>
    </div>
  </div>
</div>

<div id="modal-backdrop">
  <div id="modal">
    <h3 id="modal-title">Confirm Reset</h3>
    <p id="modal-msg"></p>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-confirm" id="modal-ok">Reset</button>
    </div>
  </div>
</div>

// State
let progress = {};
let treeState = {};
let currentView = 'cards';
let activeSubject = null;
let modalCallback = null;

const COLORS = ["#1971c2","#2f9e44","#e67700","#c92a2a","#6741d9","#0c8599","#d9480f","#2b8a3e","#a61e4d","#1864ab","#5c940d","#e03131","#862e9c"];

function getColor(idx) { return COLORS[idx % COLORS.length]; }

function collectLeaves(node) {
  if (!node.children || node.children.length === 0) return [node.id];
  return node.children.flatMap(collectLeaves);
}

function getSubjectLeaves(subj) {
  return subj.nodes.flatMap(collectLeaves);
}

function countSubject(subj) {
  const leaves = getSubjectLeaves(subj);
  const done = leaves.filter(id => progress[id]).length;
  return { total: leaves.length, done };
}

function getTotals() {
  let total = 0, done = 0;
  SUBJECTS.forEach(s => { const c = countSubject(s); total += c.total; done += c.done; });
  return { total, done };
}

function saveProgress() {
  localStorage.setItem('studyProgress', JSON.stringify(progress));
}

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem('studyProgress') || '{}'); } catch { progress = {}; }
}

function saveTreeState() {
  localStorage.setItem('studyTreeState', JSON.stringify(treeState));
}

function loadTreeState() {
  try { treeState = JSON.parse(localStorage.getItem('studyTreeState') || '{}'); } catch { treeState = {}; }
}

function toggleTopic(id, checked) {
  progress[id] = checked;
  saveProgress();
  updateProgress();
}

function updateProgress() {
  const { total, done } = getTotals();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('overall-stats').textContent = done + ' / ' + total + ' topics completed';
  document.getElementById('sc-total').textContent = total;
  document.getElementById('sc-done').textContent = done;
  document.getElementById('sc-rem').textContent = total - done;
  document.getElementById('sc-pct').textContent = pct + '%';
  document.getElementById('sidebar-overall').textContent = pct + '% overall';
  renderNav();
  if (currentView === 'cards') renderCards();
  else updateTreeVisuals();
}

function resetProgress(scope) {
  if (scope === 'all') {
    progress = {};
  } else {
    const s = SUBJECTS.find(s => s.id === scope);
    if (s) getSubjectLeaves(s).forEach(id => delete progress[id]);
  }
  saveProgress();
  updateProgress();
  if (currentView === 'tree') renderTree();
}

function confirmReset(scope) {
  const isAll = scope === 'all';
  document.getElementById('modal-title').textContent = isAll ? 'Reset All Progress' : 'Reset Subject Progress';
  document.getElementById('modal-msg').textContent = isAll
    ? 'This will clear all completed topics across every subject. This cannot be undone.'
    : 'This will clear all completed topics in ' + (SUBJECTS.find(s => s.id === scope)?.name || scope) + '. This cannot be undone.';
  document.getElementById('modal-ok').onclick = () => { resetProgress(scope); closeModal(); };
  document.getElementById('modal-backdrop').classList.add('show');
}

function closeModal() { document.getElementById('modal-backdrop').classList.remove('show'); }

function setView(v) {
  currentView = v;
  document.getElementById('view-cards').style.display = v === 'cards' ? '' : 'none';
  document.getElementById('view-tree').style.display = v === 'tree' ? '' : 'none';
  document.getElementById('btn-cards').classList.toggle('active', v === 'cards');
  document.getElementById('btn-tree').classList.toggle('active', v === 'tree');
  if (v === 'tree') {
    renderTree();
  } else {
    renderCards();
    document.getElementById('content-title').textContent = activeSubject ? SUBJECTS.find(s=>s.id===activeSubject)?.name : 'All Subjects';
  }
}

function navTo(subjId) {
  activeSubject = subjId;
  document.querySelectorAll('.nav-subject').forEach(el => el.classList.toggle('active', el.dataset.id === subjId));
  document.getElementById('content-title').textContent = subjId ? SUBJECTS.find(s=>s.id===subjId)?.name : 'All Subjects';
  if (currentView === 'cards') renderCards();
  else { renderTree(); }
}

function renderNav() {
  const list = SUBJECTS.map((s, i) => {
    const { total, done } = countSubject(s);
    return `<div class="nav-subject${s.id === activeSubject ? ' active' : ''}" data-id="${s.id}" onclick="navTo('${s.id}')">
      <span style="color:${getColor(i)}">●</span>
      <span>${s.name}</span>
      <span class="nav-badge">${done}/${total}</span>
    </div>`;
  }).join('');
  document.getElementById('subject-nav').innerHTML =
    `<div class="nav-subject${!activeSubject ? ' active' : ''}" data-id="" onclick="navTo(null)">
      <span>📊</span><span>All Subjects</span>
    </div>` + list;
}

function renderCards() {
  const list = activeSubject ? SUBJECTS.filter(s => s.id === activeSubject) : SUBJECTS;
  const grid = document.getElementById('subjects-grid');
  grid.innerHTML = list.map((s, si) => {
    const idx = SUBJECTS.indexOf(s);
    const { total, done } = countSubject(s);
    const pct = total ? Math.round(done / total * 100) : 0;
    let statusCls, statusTxt;
    if (pct === 100) { statusCls = 'status-complete'; statusTxt = '✅ Completed'; }
    else if (pct === 0) { statusCls = 'status-none'; statusTxt = '⚪ Not Started'; }
    else { statusCls = 'status-partial'; statusTxt = '🟡 ' + pct + '% Completed'; }
    const color = getColor(idx);
    const barW = pct;
    return `<div class="subject-card${s.id === activeSubject ? ' active' : ''}" onclick="navToAndTree('${s.id}')">
      <div class="subject-card-header">
        <div class="subject-card-name" style="color:${color}">${s.name}</div>
        <span class="subject-card-status ${statusCls}">${statusTxt}</span>
      </div>
      <div class="subject-card-count">${done} / ${total} Topics</div>
      <div class="card-bar-wrap"><div class="card-bar" style="width:${barW}%;background:${color}"></div></div>
      <div class="card-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function navToAndTree(id) {
  navTo(id);
  setView('tree');
  document.getElementById('btn-cards').classList.remove('active');
  document.getElementById('btn-tree').classList.add('active');
}

function renderTree() {
  const list = activeSubject ? SUBJECTS.filter(s => s.id === activeSubject) : SUBJECTS;
  const container = document.getElementById('view-tree');
  container.innerHTML = list.map((s, si) => {
    const idx = SUBJECTS.indexOf(s);
    const { total, done } = countSubject(s);
    const pct = total ? Math.round(done / total * 100) : 0;
    const isOpen = treeState['subj_' + s.id] !== false;
    const color = getColor(idx);
    let meta = pct === 100 ? '✅ All done' : (pct === 0 ? '⚪ Not started' : `🟡 ${done}/${total}`);
    return `<div class="tree-subject" id="ts_${s.id}">
      <div class="tree-subject-header" onclick="toggleSubject('${s.id}')">
        <span class="chevron ${isOpen ? 'open' : ''}" id="chev_${s.id}">▶</span>
        <span class="tree-subject-name" style="color:${color}">${s.name}</span>
        <span class="tree-subject-meta">${meta}</span>
        <button class="btn btn-sm btn-danger" style="margin-left:8px" onclick="event.stopPropagation();confirmReset('${s.id}')">Reset</button>
      </div>
      <div class="tree-body ${isOpen ? '' : 'hidden'}" id="tb_${s.id}">
        ${renderNodes(s.nodes, 1, s.id)}
      </div>
    </div>`;
  }).join('');
}

function renderNodes(nodes, depth, subjId) {
  return nodes.map(node => {
    if (!node.children || node.children.length === 0) {
      const done = !!progress[node.id];
      return `<div class="tree-node leaf indent-${depth-1}${done ? ' done' : ''}" id="tn_${node.id}" onclick="cbClick('${node.id}')">
        <span class="leaf-icon">📄</span>
        <span class="leaf-label">${node.label}</span>
        <input type="checkbox" class="leaf-cb" id="cb_${node.id}" ${done ? 'checked' : ''} onclick="event.stopPropagation();toggleCB('${node.id}',this)">
      </div>`;
    } else {
      const isOpen = treeState['branch_' + subjId + '_' + node.id] !== false;
      return `<div class="tree-node branch indent-${depth-1}" id="br_${node.id}">
        <span class="branch-icon branch-toggle" onclick="toggleBranch('${subjId}','${node.id}')" id="bchev_${node.id}">${isOpen ? '▼' : '▶'}</span>
        <span class="branch-toggle" onclick="toggleBranch('${subjId}','${node.id}')">${node.label}</span>
      </div>
      <div id="bchildren_${node.id}" ${isOpen ? '' : 'style="display:none"'}>
        ${renderNodes(node.children, depth + 1, subjId)}
      </div>`;
    }
  }).join('');
}

function cbClick(id) {
  const cb = document.getElementById('cb_' + id);
  if (cb) { cb.checked = !cb.checked; toggleCB(id, cb); }
}

function toggleCB(id, cb) {
  const checked = cb.checked;
  progress[id] = checked;
  saveProgress();
  const node = document.getElementById('tn_' + id);
  if (node) node.classList.toggle('done', checked);
  updateProgress();
}

function toggleSubject(sid) {
  const body = document.getElementById('tb_' + sid);
  const chev = document.getElementById('chev_' + sid);
  const isOpen = !body.classList.contains('hidden');
  body.classList.toggle('hidden', isOpen);
  chev.classList.toggle('open', !isOpen);
  treeState['subj_' + sid] = !isOpen;
  saveTreeState();
}

function toggleBranch(sid, nid) {
  const ch = document.getElementById('bchildren_' + nid);
  const chev = document.getElementById('bchev_' + nid);
  const isOpen = ch.style.display !== 'none';
  ch.style.display = isOpen ? 'none' : '';
  chev.textContent = isOpen ? '▶' : '▼';
  treeState['branch_' + sid + '_' + nid] = !isOpen;
  saveTreeState();
}

function updateTreeVisuals() {
  SUBJECTS.forEach(s => {
    const { total, done } = countSubject(s);
    const pct = total ? Math.round(done / total * 100) : 0;
    const meta = document.querySelector(`#ts_${s.id} .tree-subject-meta`);
    if (meta) {
      let txt = pct === 100 ? '✅ All done' : (pct === 0 ? '⚪ Not started' : `🟡 ${done}/${total}`);
      meta.textContent = txt;
    }
  });
}

// Search
let searchTimer = null;
document.getElementById('search').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => doSearch(this.value.trim()), 150);
});

function doSearch(q) {
  if (!q) {
    clearSearch();
    return;
  }
  if (currentView !== 'tree') { setView('tree'); }
  const lower = q.toLowerCase();
  // Show all subjects, expand matching
  SUBJECTS.forEach(s => {
    const body = document.getElementById('tb_' + s.id);
    const chev = document.getElementById('chev_' + s.id);
    if (body) { body.classList.remove('hidden'); if (chev) chev.classList.add('open'); }
    // Expand all branches
    s.nodes.forEach(n => {
      if (n.children) {
        const ch = document.getElementById('bchildren_' + n.id);
        const bchev = document.getElementById('bchev_' + n.id);
        if (ch) { ch.style.display = ''; if (bchev) bchev.textContent = '▼'; }
      }
    });
    // Hide/show leaf nodes
    const leaves = getSubjectLeaves(s);
    leaves.forEach(id => {
      const el = document.getElementById('tn_' + id);
      if (!el) return;
      const label = el.querySelector('.leaf-label');
      const matches = label && label.textContent.toLowerCase().includes(lower);
      el.style.display = matches ? '' : 'none';
    });
  });
}

function clearSearch() {
  document.querySelectorAll('.tree-node.leaf').forEach(el => el.style.display = '');
  SUBJECTS.forEach(s => {
    const isOpen = treeState['subj_' + s.id] !== false;
    const body = document.getElementById('tb_' + s.id);
    const chev = document.getElementById('chev_' + s.id);
    if (body) { body.classList.toggle('hidden', !isOpen); if (chev) chev.classList.toggle('open', isOpen); }
  });
}

// Init
loadProgress();
loadTreeState();
renderNav();
renderCards();
updateProgress();
