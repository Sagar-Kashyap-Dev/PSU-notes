<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70-Day Core CS Numerical Tracker</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --sidebar-width: 360px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #0f172a, #1e3a8a);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 10;
            gap: 12px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .controls-pane {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: white;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background-color: var(--card-bg);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            z-index: 5;
            box-shadow: 2px 0 5px rgba(0,0,0,0.03);
        }

        .sidebar-header {
            padding: 15px;
            background-color: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            height: 60px;
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #334155;
        }

        .topics-list {
            overflow-y: auto;
            flex: 1;
        }

        .topic-row {
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
            user-select: none;
        }

        .topic-row.heading-1 { 
            background-color: #cbd5e1; 
            font-weight: 700; 
            font-size: 0.9rem;
            color: #1e293b;
        }

        .topic-row.item { 
            padding-left: 25px; 
            background-color: #ffffff; 
        }
        
        .topic-row.hidden {
            display: none !important;
        }

        .topic-label-container {
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .top20-badge {
            background-color: #ef4444;
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 5px;
            border-radius: 4px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .counter-badge {
            background-color: #f1f5f9;
            color: #64748b;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .grid-container {
            flex: 1;
            overflow: auto;
            background-color: #fff;
        }

        .sheet-table {
            border-collapse: collapse;
            table-layout: fixed;
        }

        .grid-header-row {
            height: 60px;
            background-color: #f1f5f9;
        }

        .date-cell {
            width: 75px;
            min-width: 75px;
            max-width: 75px;
            text-align: center;
            border-right: 1px solid var(--border-color);
            border-bottom: 2px solid var(--border-color);
            font-size: 0.72rem;
            font-weight: 600;
            padding: 5px;
            background-color: #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 2;
            color: #475569;
        }

        .date-cell.today {
            background-color: #fde047;
            color: #0f172a;
        }

        .date-cell.past {
            background-color: #e2e8f0;
            color: #64748b;
        }

        .grid-row { height: 48px; }
        .grid-row.heading-1-space { background-color: #cbd5e1; }
        .grid-row.hidden { display: none !important; }

        .checkbox-cell {
            width: 75px;
            text-align: center;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            position: relative;
            vertical-align: middle;
        }

        .checkbox-cell:hover { background-color: #f8fafc; }
        .checkbox-cell.past-cell { background-color: #fdfdfd; }

        .cell-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: relative;
        }

        .tracker-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2563eb;
        }

        .comment-icon {
            position: absolute;
            bottom: 3px;
            right: 3px;
            width: 8px;
            height: 8px;
            background-color: #cbd5e1;
            border-radius: 50%;
            cursor: pointer;
            display: none;
        }

        .checkbox-cell:hover .comment-icon,
        .comment-icon.has-comment {
            display: block;
        }

        .comment-icon.has-comment {
            background-color: #3b82f6;
            width: 9px;
            height: 9px;
            border-radius: 2px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            transform: scale(0.95);
            transition: transform 0.15s ease;
        }

        .modal-overlay.active .modal { transform: scale(1); }
        .modal h3 { margin-bottom: 4px; font-size: 1.1rem; color: #0f172a; }
        .modal p { font-size: 0.8rem; color: #64748b; margin-bottom: 16px; }
        
        .modal textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            resize: none;
            margin-bottom: 16px;
            font-size: 0.88rem;
            outline: none;
        }
        .modal textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
        }

        .modal-actions { display: flex; justify-content: space-between; }
        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
        .btn-primary { background-color: #2563eb; color: white; }
        .btn-secondary { background-color: #f1f5f9; color: #475569; }
        .btn-danger { background-color: #ef4444; color: white; }

        .reset-link {
            font-size: 0.75rem;
            color: #93c5fd;
            cursor: pointer;
            text-decoration: underline;
        }
        .reset-link:hover { color: white; }
    </style>
</head>

        function getOrSetStartDate() {
            const stored = localStorage.getItem('csTracker_startDate');
            if (stored) return new Date(stored);
            
            const calculatedStart = new Date();
            calculatedStart.setDate(calculatedStart.getDate() - 3); // 3-day history shift
            
            const dateStr = calculatedStart.toISOString().split('T')[0];
            localStorage.setItem('csTracker_startDate', dateStr);
            return calculatedStart;
        }

        function confirmResetStartDate() {
            if (confirm('Re-anchor the window?\n\nThis maps Day 4 to today, retaining past performance indexes.')) {
                const calculatedStart = new Date();
                calculatedStart.setDate(calculatedStart.getDate() - 3);
                const dateStr = calculatedStart.toISOString().split('T')[0];
                localStorage.setItem('csTracker_startDate', dateStr);
                location.reload();
            }
        }

        const startDate = getOrSetStartDate();
        const todayStr  = new Date().toISOString().split('T')[0];
        const datesArray = [];

        for (let i = 0; i < 70; i++) {
            const d = new Date(startDate);
            d.setDate(startDate.getDate() + i);
            const raw = d.toISOString().split('T')[0];
            datesArray.push({
                raw,
                dayNum: i + 1,
                displayStr: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
                isToday: raw === todayStr,
                isPast: raw < todayStr
            });
        }

        sidebarScrollContainer.addEventListener('scroll', () => { gridScrollContainer.scrollTop = sidebarScrollContainer.scrollTop; });

        function initApp() {
            let headerHtml = '';
            datesArray.forEach(d => {
                let cls = d.isToday ? 'today' : (d.isPast ? 'past' : '');
                headerHtml += `<th class="date-cell ${cls}">Day ${d.dayNum}<br>${d.displayStr}</th>`;
            });
            gridHeaderDates.innerHTML = headerHtml;

            let sidebarHtml = '';
            let bodyHtml = '';

            structuredDataset.forEach(h1 => {
                sidebarHtml += `<div class="topic-row heading-1" data-subject="${h1.id}">${h1.name}</div>`;
                bodyHtml += `<tr class="grid-row heading-1-space" data-subject="${h1.id}">${datesArray.map(() => `<td class="checkbox-cell" style="background:#cbd5e1;"></td>`).join('')}</tr>`;

                h1.children.forEach(item => {
                    const isTop20 = priorityTop20Set.has(item.id);
                    const top20Badge = isTop20 ? `<span class="top20-badge">🔥 Top 20</span>` : '';
                    
                    sidebarHtml += `
                        <div class="topic-row item" data-subject="${h1.id}" data-item-id="${item.id}">
                            <div class="topic-label-container">
                                ${top20Badge}
                                <span>${item.name}</span>
                            </div>
                            <span class="counter-badge" id="counter-${item.id}">0</span>
                        </div>`;

                    let rowHtml = `<tr class="grid-row" data-subject="${h1.id}" data-item-id="${item.id}">`;
                    datesArray.forEach(dateObj => {
                        const cellId     = `${item.id}_${dateObj.raw}`;
                        const isChecked  = trackingData[cellId] ? 'checked' : '';
                        const hasComment = commentData[cellId] ? 'has-comment' : '';
                        const pastClass  = dateObj.isPast ? 'past-cell' : '';

                        rowHtml += `
                            <td class="checkbox-cell ${pastClass}">
                                <div class="cell-wrapper">
                                    <input type="checkbox" class="tracker-checkbox"
                                        data-topic="${item.id}" data-date="${dateObj.raw}"
                                        ${isChecked}
                                        onchange="toggleCheckbox(this)">
                                    <div class="comment-icon ${hasComment}" id="cmt-ico-${cellId}"
                                        onclick="openCommentModal('${item.id}', '${dateObj.raw}', '${item.name.replace(/'/g, "\\'")}', '${dateObj.displayStr}')"></div>
                                </div>
                            </td>`;
                    });
                    rowHtml += `</tr>`;
                    bodyHtml += rowHtml;
                });
            });

            sidebarContainer.innerHTML = sidebarHtml;
            gridCheckboxBody.innerHTML = bodyHtml;
            updateMetrics();

            const todayIndex = datesArray.findIndex(d => d.isToday);
            if (todayIndex > 0) {
                gridScrollContainer.scrollLeft = (todayIndex * 75) - 75; 
            }
        }

        function toggleCheckbox(element) {
            const topicId = element.getAttribute('data-topic');
            const dateStr = element.getAttribute('data-date');
            const cellId  = `${topicId}_${dateStr}`;

            if (element.checked) {
                trackingData[cellId] = true;
            } else {
                delete trackingData[cellId];
            }

            localStorage.setItem('csTracker_checks', JSON.stringify(trackingData));
            updateMetrics();
        }

        function updateMetrics() {
            const countsMap = {};
            let totalGlobalChecked = 0;

            Object.keys(trackingData).forEach(key => {
                const match = key.match(/^(.+)_(\d{4}-\d{2}-\d{2})$/);
                if (!match) return;
                const topicId = match[1];
                countsMap[topicId] = (countsMap[topicId] || 0) + 1;
                totalGlobalChecked++;
            });

            document.querySelectorAll('.counter-badge').forEach(badge => {
                const id = badge.id.replace('counter-', '');
                badge.innerText = countsMap[id] || 0;
            });

            document.getElementById('overall-progress').innerText = `Sessions: ${totalGlobalChecked} Done`;
        }

        function applySubjectFilter() {
            const filterValue = document.getElementById('subject-filter').value;
            
            const rowsAndHeaders = document.querySelectorAll('[data-subject]');
            rowsAndHeaders.forEach(el => {
                const rowSub = el.getAttribute('data-subject');
                const itemId = el.getAttribute('data-item-id');

                if (filterValue === 'all') {
                    el.classList.remove('hidden');
                } else if (filterValue === 'top20') {
                    if (itemId && priorityTop20Set.has(itemId)) {
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                } else {
                    if (rowSub === filterValue) {
                        el.classList.remove('hidden');
                    } else {
                        el.classList.add('hidden');
                    }
                }
            });
        }

        function openCommentModal(topicId, dateStr, topicName, dateDisplay) {
            activeCellTarget.topicId = topicId;
            activeCellTarget.dateStr = dateStr;
            const cellId = `${topicId}_${dateStr}`;

            document.getElementById('modal-title').innerText    = topicName;
            document.getElementById('modal-subtitle').innerText = `Notes for ${dateDisplay}`;

            const currentComment = commentData[cellId] || '';
            document.getElementById('comment-text').value = currentComment;
            document.getElementById('btn-delete-comment').style.display = currentComment ? 'inline-block' : 'none';
            document.getElementById('comment-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('comment-modal').classList.remove('active');
        }

        function saveComment() {
            const cellId      = `${activeCellTarget.topicId}_${activeCellTarget.dateStr}`;
            const textValue   = document.getElementById('comment-text').value.trim();
            const iconElement = document.getElementById(`cmt-ico-${cellId}`);

            if (textValue) {
                commentData[cellId] = textValue;
                if (iconElement) iconElement.classList.add('has-comment');
            } else {
                delete commentData[cellId];
                if (iconElement) iconElement.classList.remove('has-comment');
            }

            localStorage.setItem('csTracker_comments', JSON.stringify(commentData));
            closeModal();
        }

        function deleteComment() {
            const cellId      = `${activeCellTarget.topicId}_${activeCellTarget.dateStr}`;
            const iconElement = document.getElementById(`cmt-ico-${cellId}`);

            delete commentData[cellId];
            if (iconElement) iconElement.classList.remove('has-comment');

            localStorage.setItem('csTracker_comments', JSON.stringify(commentData));
            closeModal();
        }

        window.onload = initApp;
    </script>
</body>
</html>
